name: Build Static ARM32 (Final)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Multi-arch and ARMHF Libs
        run: |
          sudo dpkg --add-architecture armhf
          # 针对 Ubuntu 24.04 注入正确的 ARMHF 源
          sudo tee /etc/apt/sources.list.d/armhf.list <<EOF
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          EOF
          sudo sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
          sudo apt-get update || true
          sudo apt-get install -y gcc-arm-linux-gnueabihf zlib1g-dev:armhf

      - name: Build ARM32 Static
        run: |
          cd src
          # 1. 物理生成 base64u.c
          sed -e 's/base64/base64u/g' -e 's/BASE64/BASE64U/g' base64.c > base64u.c
          
          # 2. 注入宏定义 (明确指定为长整型，确保 32 位系统兼容性)
          echo '#define GITREVISION "0.8.0"' > version.h
          echo '#define PROTOCOL_VERSION ((uint32_t)0x00000502)' >> version.h
          
          # 3. 强制注入头文件引用，解决 uint32_t 未定义问题
          sed -i '1i #include <stdint.h>\n#include "version.h"\n#define _GNU_SOURCE\n#include <unistd.h>\n#include <netdb.h>' common.h
          
          # 4. 精准交叉编译
          # -march=armv7-a: 锁定你的 CPU 架构
          # -mfloat-abi=hard: 你的 cpuinfo 显示支持 vfpv4，优先使用硬件浮点
          # -s: 剥离所有调试符号，确保文件精简
          arm-linux-gnueabihf-gcc -static -O3 -s \
          -march=armv7-a -mfpu=vfpv4 -mfloat-abi=hard \
          -DNO_ZLIB=0 \
          util.c common.c tun.c dns.c read.c encoding.c login.c base32.c \
          base64.c base64u.c base128.c md5.c client.c iodine.c \
          -o iodine_v7l -lz -lm

      - name: Verify Architecture
        run: |
          # 验证是否为 32-bit ELF
          readelf -h src/iodine_v7l

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: iodine-v7l-static
          path: src/iodine_v7l
