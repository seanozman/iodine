name: Build Static ARM32
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf zlib1g-dev libz-dev

      - name: Build ARM32 Static
        run: |
          cd src
          # 1. 物理生成缺失零件
          sed -e 's/base64/base64u/g' -e 's/BASE64/BASE64U/g' base64.c > base64u.c
          
          # 2. 注入宏定义 (修正了引号转义问题)
          echo '#define GITREVISION "0.8.0"' > version.h
          echo '#define PROTOCOL_VERSION "00000502"' >> version.h
          
          # 3. 修改 common.h 引入必要的头文件
          sed -i '1i #include "version.h"\n#define _GNU_SOURCE\n#include <unistd.h>\n#include <netdb.h>' common.h
          
          # 4. 交叉编译 (移除命令行中的 -D 定义，全部依赖 version.h)
          arm-linux-gnueabihf-gcc -static -O2 -Wall -DNO_ZLIB=0 \
          util.c common.c tun.c dns.c read.c encoding.c login.c base32.c \
          base64.c base64u.c base128.c md5.c client.c iodine.c \
          -o iodine_arm32 -lz -lm

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: iodine-v7l
          path: src/iodine_arm32
