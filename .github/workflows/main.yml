name: Perfect Native ARM64 Build
on: [push]

jobs:
  build_arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM64 Container
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w /work/src \
          --platform linux/arm64 debian:bookworm sh -c "
            apt-get update && \
            apt-get install -y gcc make libc6-dev zlib1g-dev git && \
            
            # 1. 修复版本号报错：手动定义 GITREVISION，不再依赖 git 命令
            sed -i 's/\$(shell git describe --tags --always)/\"0.8.0\"/g' Makefile && \
            
            # 2. 修复所有头文件定义：在 common.h 顶部强行注入宏
            # 这一步能解决你刚才看到的 getopt 和 AI_PASSIVE 未定义报错
            sed -i '1i #define _GNU_SOURCE\n#include <unistd.h>\n#include <netdb.h>' common.h && \
            
            # 3. 强制静态编译完整版（包含 zlib）
            make CC=gcc CFLAGS='-O2 -Wall -DNO_ZLIB=0' LDFLAGS='-static -lz' iodine
          "

      - name: Verify and Upload
        uses: actions/upload-artifact@v4
        with:
          name: iodine-perfect-arm64
          path: src/iodine
