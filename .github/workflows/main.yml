name: Official Style ARM64 Build
on: [push]

jobs:
  build_arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup QEMU (ARM64 Emulation)
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM64 Container
        run: |
          # 我们启动一个真正的 ARM64 容器（Debian），在里面跑完整的 make
          # 这样就不存在交叉编译的环境变量问题，它是“原生”编译
          docker run --rm -v ${{ github.workspace }}:/work -w /work/src \
          --platform linux/arm64 debian:bookworm sh -c "
            apt-get update && \
            apt-get install -y gcc make libc6-dev zlib1g-dev && \
            # 修改 Makefile 强制进行静态链接
            sed -i 's/LDFLAGS += -lz/LDFLAGS += -lz -static/g' Makefile && \
            # 执行完整的编译流程
            make iodine
          "

      - name: Verify and Upload
        uses: actions/upload-artifact@v4
        with:
          name: iodine-perfect-arm64
          path: src/iodine
