name: Build Static ARM64
on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Native Build
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w /work/src \
          --platform linux/arm64 debian:bookworm sh -c "
            apt-get update && \
            apt-get install -y gcc make libc6-dev zlib1g-dev --no-install-recommends && \
            sed -i '1i #define GITREVISION \"0.8.0\"' common.h && \
            sed -i '2i #define _GNU_SOURCE\n#include <unistd.h>\n#include <netdb.h>' common.h && \
            make CC=gcc CFLAGS='-O2 -Wall -DNO_ZLIB=0' LDFLAGS='-static' iodine && \
            cp iodine iodine_arm64
          "

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: iodine-binary
          path: src/iodine_arm64
