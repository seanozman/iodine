name: Build Static ARM64
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 更新到 v4
      
      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          
      - name: Compile (Static & No-Zlib)
        run: |
          cd src
          sed -i 's/#include <zlib.h>/\/\/#include <zlib.h>/g' client.c
          sed -i 's/#include <zlib.h>/\/\/#include <zlib.h>/g' common.h
          aarch64-linux-gnu-gcc -static -DNO_ZLIB -DZ_OK=0 -o iodine_arm64 *.c -lm
          
      - name: Upload Result
        uses: actions/upload-artifact@v4 # 关键：必须改为 v4 才能解决截图里的报错
        with:
          name: iodine-binary
          path: src/iodine_arm64
