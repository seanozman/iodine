name: Build Static ARM64
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Native Build
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w /work/src \
          --platform linux/arm64 debian:bookworm sh -c "
            apt-get update && \
            apt-get install -y gcc make libc6-dev zlib1g-dev --no-install-recommends && \
            
            # 1. 物理生成缺失零件：base64u.c
            sed -e 's/base64/base64u/g' -e 's/BASE64/BASE64U/g' base64.c > base64u.c
            
            # 2. 强行补齐代码里缺失的宏和系统头文件
            echo '#define GITREVISION \"0.8.0\"' > version.h
            sed -i '1i #include \"version.h\"\n#define _GNU_SOURCE\n#include <unistd.h>\n#include <netdb.h>' common.h
            
            # 3. 终极一锅烩：直接把所有 C 文件编译成静态二进制
            gcc -static -O2 -Wall -DNO_ZLIB=0 \
            util.c common.c tun.c dns.c read.c encoding.c login.c base32.c \
            base64.c base64u.c base128.c md5.c client.c iodine.c \
            -o iodine_arm64 -lz -lm
          "

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: iodine-binary
          path: src/iodine_arm64
